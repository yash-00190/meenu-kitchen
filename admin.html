<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Report — Meenu's Kitchen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <style>
    /* Admin page specific styles */
    .admin-body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .admin-dashboard {
      max-width: 1000px;
      margin: 0 auto;
    }

    .admin-hero {
      text-align: center;
      padding: 30px 20px;
      margin-bottom: 30px;
    }

    .admin-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.5rem;
      color: #fff;
      margin: 0;
      letter-spacing: 2px;
    }

    .admin-subtitle {
      color: #888;
      font-size: 0.95rem;
      margin-top: 8px;
    }

    .report-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .report-card {
      background: linear-gradient(145deg, #1f1f3a, #252550);
      border-radius: 16px;
      padding: 24px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .report-card h3 {
      color: #888;
      font-size: 0.85rem;
      font-weight: 500;
      margin: 0 0 12px 0;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .report-value {
      font-size: 2.2rem;
      font-weight: 700;
      color: #fff;
      margin: 0;
    }

    .report-hint {
      color: #666;
      font-size: 0.8rem;
      margin-top: 8px;
    }

    /* Card color accents */
    .card-today { border-left: 4px solid #4ade80; }
    .card-week { border-left: 4px solid #60a5fa; }
    .card-completed { border-left: 4px solid #a78bfa; }
    .card-pending { border-left: 4px solid #fbbf24; }
    .card-fee { border-left: 4px solid #f472b6; }
    .card-due { border-left: 4px solid #ef4444; }

    .card-today .report-value { color: #4ade80; }
    .card-week .report-value { color: #60a5fa; }
    .card-completed .report-value { color: #a78bfa; }
    .card-pending .report-value { color: #fbbf24; }
    .card-fee .report-value { color: #f472b6; }
    .card-due .report-value { color: #ef4444; }

    /* Summary section */
    .summary-section {
      background: linear-gradient(145deg, #1f1f3a, #252550);
      border-radius: 16px;
      padding: 24px;
      border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 20px;
    }

    .summary-section h2 {
      color: #fff;
      font-size: 1.1rem;
      margin: 0 0 20px 0;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .summary-row:last-child {
      border-bottom: none;
    }

    .summary-label {
      color: #888;
      font-size: 0.95rem;
    }

    .summary-value {
      color: #fff;
      font-weight: 600;
      font-size: 0.95rem;
    }

    .highlight-row {
      background: rgba(239, 68, 68, 0.1);
      margin: 0 -24px;
      padding: 12px 24px;
      border-radius: 8px;
    }

    .highlight-row .summary-value {
      color: #ef4444;
      font-size: 1.1rem;
    }

    /* Refresh button */
    .refresh-btn {
      background: linear-gradient(135deg, #4ade80, #22c55e);
      color: #000;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .refresh-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(74, 222, 128, 0.3);
    }

    .last-updated {
      color: #666;
      font-size: 0.8rem;
      margin-left: 16px;
    }

    .nav-links {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 16px;
    }

    .nav-link {
      color: #60a5fa;
      text-decoration: none;
      font-size: 0.9rem;
      padding: 8px 16px;
      border: 1px solid #60a5fa;
      border-radius: 6px;
      transition: all 0.2s;
    }

    .nav-link:hover {
      background: #60a5fa;
      color: #000;
    }

    .loading {
      text-align: center;
      color: #888;
      padding: 40px;
    }

    .error {
      text-align: center;
      color: #ef4444;
      padding: 40px;
    }
  </style>
</head>
<body class="admin-body">
  <div class="admin-dashboard">
    <header class="admin-hero">
      <h1 class="admin-title">📊 Admin Report</h1>
      <p class="admin-subtitle">Meenu's Kitchen • Vendor Fee Analytics</p>
      <div class="nav-links">
        <a href="/" class="nav-link">Customer Page</a>
        <a href="/vendor.html" class="nav-link">Vendor Dashboard</a>
      </div>
    </header>

    <div id="report-content">
      <p class="loading">Loading report data...</p>
    </div>
  </div>

  <script>
    // ── Firebase Configuration ────────────────────────
    const firebaseConfig = {
      apiKey: "AIzaSyAN-6NRywCLzKLkp5djAY60Bhiq2B77uRA",
      authDomain: "smart-ordering-system-e5a2b.firebaseapp.com",
      projectId: "smart-ordering-system-e5a2b",
      storageBucket: "smart-ordering-system-e5a2b.firebasestorage.app",
      messagingSenderId: "882792553531",
      appId: "1:882792553531:web:f5e1b1de1db6b478fe901e"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const ordersCollection = db.collection('orders');

    // ── Helper: Get start of today ────────────────────
    function getTodayStart() {
      const now = new Date();
      return new Date(now.getFullYear(), now.getMonth(), now.getDate());
    }

    // ── Helper: Get start of this week (Monday) ───────
    function getWeekStart() {
      const today = getTodayStart();
      const dayOfWeek = today.getDay();
      const diff = dayOfWeek === 0 ? 6 : dayOfWeek - 1; // Adjust for Monday start
      const weekStart = new Date(today);
      weekStart.setDate(today.getDate() - diff);
      return weekStart;
    }

    // ── Helper: Convert Firestore timestamp to Date ───
    function toDate(timestamp) {
      if (!timestamp) return null;
      // Handle Firestore Timestamp object
      if (timestamp.toDate) {
        return timestamp.toDate();
      }
      // Handle ISO string
      return new Date(timestamp);
    }

    // ── Load Report from Firestore ────────────────────
    async function loadReport() {
      const container = document.getElementById('report-content');
      
      try {
        // Get all orders from Firestore
        const snapshot = await ordersCollection.get();
        
        // Convert snapshot to array of orders
        const orders = [];
        snapshot.forEach(doc => {
          orders.push({ id: doc.id, ...doc.data() });
        });

        // Get date boundaries
        const todayStart = getTodayStart();
        const weekStart = getWeekStart();

        // Filter today's orders
        const todayOrders = orders.filter(order => {
          const orderDate = toDate(order.createdAt);
          return orderDate && orderDate >= todayStart;
        });

        // Filter this week's orders
        const weekOrders = orders.filter(order => {
          const orderDate = toDate(order.createdAt);
          return orderDate && orderDate >= weekStart;
        });

        // Count completed orders (status = "Ready")
        const completedOrders = orders.filter(o => o.status === 'Ready').length;

        // Count orders by status
        const newOrders = orders.filter(o => o.status === 'New').length;
        const preparingOrders = orders.filter(o => o.status === 'Preparing').length;
        const readyOrders = orders.filter(o => o.status === 'Ready').length;

        // Calculate vendor payable = completed orders × ₹1
        const vendorPayable = completedOrders * 1;

        // Calculate revenue from subtotal field
        const totalRevenue = orders.reduce((sum, o) => sum + Number(o.subtotal || 0), 0);
        const todayRevenue = todayOrders.reduce((sum, o) => sum + Number(o.subtotal || 0), 0);
        const weekRevenue = weekOrders.reduce((sum, o) => sum + Number(o.subtotal || 0), 0);

        // Create data object for rendering
        const data = {
          totalOrdersToday: todayOrders.length,
          totalOrdersThisWeek: weekOrders.length,
          totalOrdersAllTime: orders.length,
          completedOrders,
          newOrders,
          preparingOrders,
          readyOrders,
          vendorPayable,
          totalRevenue,
          todayRevenue,
          weekRevenue,
        };

        renderReport(data);
      } catch (error) {
        console.error('Failed to load report:', error);
        container.innerHTML = '<p class="error">Failed to load report. Please try again.<br><small>Error: ' + error.message + '</small></p>';
      }
    }

    // ── Render Report UI ──────────────────────────────
    function renderReport(data) {
      const container = document.getElementById('report-content');
      const now = new Date().toLocaleString('en-IN', { 
        dateStyle: 'medium', 
        timeStyle: 'short' 
      });

      container.innerHTML = `
        <div class="report-grid">
          <div class="report-card card-today">
            <h3>Orders Today</h3>
            <p class="report-value">${data.totalOrdersToday}</p>
            <p class="report-hint">Revenue: ₹${data.todayRevenue}</p>
          </div>

          <div class="report-card card-week">
            <h3>Orders This Week</h3>
            <p class="report-value">${data.totalOrdersThisWeek}</p>
            <p class="report-hint">Revenue: ₹${data.weekRevenue}</p>
          </div>

          <div class="report-card card-completed">
            <h3>Completed Orders</h3>
            <p class="report-value">${data.completedOrders}</p>
            <p class="report-hint">Status: Ready</p>
          </div>

          <div class="report-card card-pending">
            <h3>Active Orders</h3>
            <p class="report-value">${data.newOrders + data.preparingOrders}</p>
            <p class="report-hint">New: ${data.newOrders} | Preparing: ${data.preparingOrders}</p>
          </div>

          <div class="report-card card-fee">
            <h3>Total Revenue</h3>
            <p class="report-value">₹${data.totalRevenue}</p>
            <p class="report-hint">All time earnings</p>
          </div>

          <div class="report-card card-due">
            <h3>Vendor Payable</h3>
            <p class="report-value">₹${data.vendorPayable}</p>
            <p class="report-hint">₹1 × ${data.completedOrders} completed orders</p>
          </div>
        </div>

        <div class="summary-section">
          <h2>📋 Summary Breakdown</h2>
          
          <div class="summary-row">
            <span class="summary-label">Total Orders (All Time)</span>
            <span class="summary-value">${data.totalOrdersAllTime}</span>
          </div>
          
          <div class="summary-row">
            <span class="summary-label">Completed Orders</span>
            <span class="summary-value">${data.completedOrders}</span>
          </div>
          
          <div class="summary-row">
            <span class="summary-label">Total Revenue (All Time)</span>
            <span class="summary-value">₹${data.totalRevenue}</span>
          </div>
          
          <div class="summary-row">
            <span class="summary-label">Vendor Fee Rate</span>
            <span class="summary-value">₹1 per completed order</span>
          </div>
          
          <div class="summary-row highlight-row">
            <span class="summary-label"><strong>Vendor Payable Amount</strong></span>
            <span class="summary-value">₹${data.vendorPayable}</span>
          </div>
        </div>

        <div style="text-align: center; margin-top: 20px;">
          <button class="refresh-btn" onclick="loadReport()">🔄 Refresh Report</button>
          <span class="last-updated">Last updated: ${now}</span>
        </div>
      `;
    }

    // Load report when page loads
    loadReport();
  </script>
</body>
</html>
