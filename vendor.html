<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vendor Dashboard — Meenu's Kitchen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Bebas+Neue&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="vendor-body">
  <div class="vendor-dashboard">
    <header class="vendor-hero">
      <div class="vendor-hero-top">
        <span class="hero-pill">Live Dashboard</span>
        <span class="hero-sync">Real-time updates</span>
      </div>
      <h1 class="vendor-title">Meenu's Kitchen</h1>
      <p class="vendor-subtitle">Vendor Operations Panel • Leelawati Chowk, Vijay Nagar</p>
    </header>

    <section class="dashboard-section stats-section">
      <div class="section-head">
        <h2>Summary</h2>
        <span class="section-hint">Today</span>
      </div>

      <div class="vendor-stats" id="stats">
        <div class="stat-card stat-total">
          <span class="stat-title">Total Orders</span>
          <span class="stat-num" id="stat-total">0</span>
        </div>
        <div class="stat-card stat-pending">
          <span class="stat-title">Pending Orders</span>
          <span class="stat-num" id="stat-pending">0</span>
        </div>
        <div class="stat-card stat-preparing">
          <span class="stat-title">Preparing Orders</span>
          <span class="stat-num" id="stat-preparing">0</span>
        </div>
        <div class="stat-card stat-ready">
          <span class="stat-title">Ready Orders</span>
          <span class="stat-num" id="stat-ready">0</span>
        </div>
        <div class="stat-card stat-revenue">
          <span class="stat-title">Total Revenue</span>
          <span class="stat-num" id="stat-revenue">₹0</span>
        </div>
      </div>
    </section>

    <section class="dashboard-section orders-section">
      <div class="section-head">
        <h2>Incoming Orders</h2>
        <span class="orders-count-pill" id="active-order-pill">0 active</span>
      </div>

      <div id="orders-list" class="orders-list">
        <p class="empty-msg">No orders yet. Waiting for customers...</p>
      </div>
    </section>
  </div>

  <script>
    function escapeHtml(text) {
      if (text === null || text === undefined) return '';
      const div = document.createElement('div');
      div.textContent = String(text);
      return div.innerHTML;
    }

    async function loadOrders() {
      try {
        const res = await fetch('/api/orders');

        if (!res.ok) {
          throw new Error('Failed to fetch orders');
        }

        const orders = await res.json();
        renderOrders(orders);
        updateStats(orders);
      } catch (error) {
        console.error('Failed to load orders:', error);
        document.getElementById('orders-list').innerHTML =
          '<div class="empty-state"><h3>Error loading orders</h3><p>Please refresh the page.</p></div>';
      }
    }

    function renderOrders(orders) {
      const container = document.getElementById('orders-list');

      if (!orders || orders.length === 0) {
        container.innerHTML =
          '<div class="empty-state"><h3>No orders today</h3><p>New customer orders will appear here automatically.</p></div>';
        return;
      }

      let html = '';

      for (const order of orders) {
        const statusValue = order.status || 'New';
        const statusClass = statusValue.toLowerCase().replace(/\s/g, '');
        const paymentValue = order.paymentStatus || order.paymentMethod || 'N/A';
        const paymentClass = paymentValue === 'Paid' ? 'payment-paid' : 'payment-counter';
        const totalValue = Number(order.subtotal || order.total || 0);

        const itemsHtml = (order.items || []).map(item => {
          const variantLabel = item.variant
            ? ` (${item.variant === 'half' ? 'Half' : 'Full'})`
            : '';
          const lineTotal = Number(item.lineTotal || ((item.price || 0) * (item.qty || 0)));

          return `
            <div class="order-item-line">
              <span>${escapeHtml(item.name)}${variantLabel} × ${item.qty}</span>
              <strong>₹${lineTotal}</strong>
            </div>
          `;
        }).join('');

        html += `
          <div class="order-card status-${statusClass}">
            <div class="order-header">
              <div class="order-id-wrap">
                <span class="order-token">#${escapeHtml(order.id)}</span>
              </div>
              <span class="order-time">${escapeHtml(order.time || '')}</span>
            </div>

            <div class="order-meta-grid">
              <div class="meta-chip">
                Customer: <strong>${escapeHtml(order.customerName || 'Guest')}</strong>
              </div>
              <div class="meta-chip">
                Payment: <span class="payment-badge ${paymentClass}">${escapeHtml(paymentValue)}</span>
              </div>
            </div>

            ${
              order.tableNumber && order.tableNumber !== 'N/A'
                ? `<div class="meta-chip">Table: <strong>${escapeHtml(order.tableNumber)}</strong></div>`
                : ''
            }

            ${
              order.specialNote && order.specialNote.trim()
                ? `<div class="meta-chip">Note: <strong>${escapeHtml(order.specialNote)}</strong></div>`
                : ''
            }

            <div class="order-items">${itemsHtml}</div>

            <div class="order-total-row">
              <span class="order-total-label">Subtotal</span>
              <span class="order-total">₹${totalValue}</span>
            </div>

            <div class="order-status-row">
              <span class="status-badge badge-${statusClass}">${escapeHtml(statusValue)}</span>
              <div class="status-actions">
                ${getActionButtons(order)}
              </div>
            </div>
          </div>
        `;
      }

      container.innerHTML = html;
    }

    function getActionButtons(order) {
      switch (order.status) {
        case 'New':
          return `<button class="btn btn-small btn-accept" onclick="updateStatus(${order.id}, 'Preparing')">Start Preparing</button>`;
        case 'Preparing':
          return `<button class="btn btn-small btn-ready" onclick="updateStatus(${order.id}, 'Ready')">Mark Ready</button>`;
        case 'Ready':
          return `<button class="btn btn-small btn-done" onclick="updateStatus(${order.id}, 'Done')">Mark Done</button>`;
        case 'Done':
          return `<span class="done-text">✓ Completed</span>`;
        default:
          return '';
      }
    }

    async function updateStatus(orderId, newStatus) {
      try {
        const allowed = ['Preparing', 'Ready', 'Done'];

        if (!allowed.includes(newStatus)) {
          alert('Invalid status');
          return;
        }

        const res = await fetch(`/api/orders/${orderId}/status`, {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ status: newStatus })
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || 'Failed to update status');
        }

        await loadOrders();
      } catch (error) {
        console.error('Failed to update status:', error);
        alert(error.message || 'Failed to update status');
      }
    }

    function updateStats(orders) {
      const newCount = orders.filter(o => o.status === 'New').length;
      const preparingCount = orders.filter(o => o.status === 'Preparing').length;
      const readyCount = orders.filter(o => o.status === 'Ready').length;
      const activeCount = newCount + preparingCount + readyCount;
      const totalRevenue = orders.reduce((sum, o) => sum + Number(o.subtotal || o.total || 0), 0);

      document.getElementById('stat-total').textContent = orders.length;
      document.getElementById('stat-pending').textContent = newCount;
      document.getElementById('stat-preparing').textContent = preparingCount;
      document.getElementById('stat-ready').textContent = readyCount;
      document.getElementById('stat-revenue').textContent = `₹${totalRevenue}`;
      document.getElementById('active-order-pill').textContent = `${activeCount} active`;
    }

    loadOrders();
    setInterval(loadOrders, 5000);
  </script>
</body>
</html>
